[tox]
envlist = check, py312

[gh-actions]
python = 3.12: py312

[testenv]
usedevelop = true
passenv =
    DJANGO_SETTINGS_MODULE
    DJANGO_SECRET_KEY
    ADMIN_USERNAME
    ADMIN_PASSWORD
    ENTRY_FOLDER
deps =
    -r requirements.txt
    pytest
    pytest-django
commands =
    python -c "import Journal.settings; print('Settings OK')"
    python -c "import django; print('Django OK')"
    pytest --tb=short -x

[testenv:check]
ignore_errors = true
deps =
    flake8
    mypy
    types-Pillow
    types-docutils
    types-setuptools
commands =
    flake8 src
    flake8 tests
    mypy --config-file tox.ini

[flake8]
max-line-length = 180
per-file-ignores = __init__.py:F401

[mypy]
files = src
pretty = True
show_error_codes = True

[mypy-typing.*]
ignore_missing_imports = True
